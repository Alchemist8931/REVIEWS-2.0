<!-- modal4.html — Пользователи (super_admin) -->
<div class="m-root" id="m4Root">
<style>
  .m-root{display:flex;flex-direction:column;height:100%;font-family:inherit;overflow:hidden}
  .m-header{display:flex;justify-content:space-between;align-items:center;height:44px;min-height:44px;padding:0 14px;border-bottom:1px solid var(--border)}
  .m-header-title{font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--fg2)}
  .m-body{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
  .search-bar{display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap}
  .search-input{flex:1;min-width:180px;padding:8px 12px;font-size:12px;border:1px solid var(--border);border-radius:6px;background:var(--inset);outline:none;font-family:inherit}.search-input:focus{border-color:var(--accent)}
  .filter-btn{padding:5px 12px;font-size:11px;font-weight:600;border:1px solid var(--border);border-radius:99px;background:var(--panel);color:var(--fg3);cursor:pointer;transition:all .15s}.filter-btn:hover{border-color:var(--fg3);color:var(--fg2)}.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .user-card{display:flex;align-items:center;gap:14px;padding:12px;background:var(--panel);border:1px solid var(--border);border-radius:var(--r);transition:box-shadow .15s}.user-card:hover{box-shadow:var(--sh-s)}
  @media(max-width:700px){.user-card{flex-direction:column;align-items:flex-start}}
  .uc-avatar{width:36px;height:36px;border-radius:6px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
  .uc-info{flex:1;min-width:0}.uc-name{font-size:13px;font-weight:600}.uc-meta{font-size:11px;color:var(--fg3);display:flex;gap:10px;flex-wrap:wrap;margin-top:1px}
  .uc-actions{display:flex;gap:5px;flex-shrink:0;flex-wrap:wrap}
  .badge{display:inline-flex;padding:2px 8px;border-radius:99px;font-size:9px;font-weight:700;text-transform:uppercase}
  .badge.admin{background:rgba(139,92,246,.07);color:#7C3AED}.badge.manager{background:var(--info-bg);color:var(--info)}.badge.client{background:var(--ok-bg);color:var(--ok)}.badge.author{background:var(--warn-bg);color:var(--warn)}.badge.active{background:var(--ok-bg);color:var(--ok)}.badge.pending{background:var(--warn-bg);color:var(--warn)}.badge.blocked{background:var(--err-bg);color:var(--err)}
  .act-btn{padding:5px 10px;font-size:10px;font-weight:600;border:1px solid var(--border);border-radius:5px;background:var(--panel);color:var(--fg2);cursor:pointer;transition:all .15s}.act-btn:hover{border-color:var(--accent);color:var(--fg)}
  .act-btn.success{background:var(--ok-bg);color:var(--ok);border-color:rgba(22,163,74,.15)}.act-btn.success:hover{background:var(--ok);color:#fff}
  .act-btn.danger{background:var(--err-bg);color:var(--err);border-color:rgba(220,38,38,.15)}.act-btn.danger:hover{background:var(--err);color:#fff}
  .empty{text-align:center;padding:30px 16px;color:var(--fg3);font-size:12px}
</style>
<header class="m-header"><div class="m-header-title">Пользователи</div></header>
<div class="m-body" id="m4Body"><div class="empty">Загрузка...</div></div>
<script>
(function(){const sb=window.supabaseClient,user=window.currentUser;if(!sb||!user)return;if(user.role!=='super_admin'){document.getElementById('m4Body').innerHTML='<div class="empty">Нет доступа</div>';return}const body=document.getElementById('m4Body');let allU=[],cf='all',sq='';loadU();
async function loadU(){body.innerHTML='<div class="empty">Загрузка...</div>';try{const{data,error}=await sb.from('users').select('*').order('created_at',{ascending:false});if(error)throw error;allU=data||[];rU()}catch(e){body.innerHTML=`<div class="empty" style="color:var(--err)">${e.message}</div>`}}
function rU(){const fl=allU.filter(u=>{if(cf!=='all'&&u.role!==cf)return false;if(sq){const q=sq.toLowerCase();return(u.first_name||'').toLowerCase().includes(q)||(u.last_name||'').toLowerCase().includes(q)||(u.email||'').toLowerCase().includes(q)||(u.phone||'').includes(q)}return true});const rl={super_admin:'Админ',manager:'Менеджер',client:'Клиент',author:'Автор'},rc={};allU.forEach(u=>{rc[u.role]=(rc[u.role]||0)+1});
body.innerHTML=`<div class="search-bar"><input class="search-input" id="userSearch" placeholder="Поиск..." value="${sq}"><button class="filter-btn ${cf==='all'?'active':''}" data-f="all">Все (${allU.length})</button>${Object.entries(rl).map(([k,v])=>`<button class="filter-btn ${cf===k?'active':''}" data-f="${k}">${v} (${rc[k]||0})</button>`).join('')}</div><div id="usersList"></div>`;
document.getElementById('userSearch').addEventListener('input',e=>{sq=e.target.value;rU()});body.querySelectorAll('.filter-btn').forEach(b=>b.addEventListener('click',()=>{cf=b.dataset.f;rU()}));
const l=document.getElementById('usersList');if(!fl.length){l.innerHTML='<div class="empty">Не найдено</div>';return}
l.innerHTML=fl.map(u=>{const ini=((u.first_name||'')[0]||'')+((u.last_name||'')[0]||''),fn=`${u.last_name||''} ${u.first_name||''} ${u.middle_name||''}`.trim(),rb=`<span class="badge ${u.role==='super_admin'?'admin':u.role}">${rl[u.role]||u.role}</span>`,sb2=`<span class="badge ${u.status}">${u.status==='active'?'Активен':u.status==='pending'?'Ожидает':'Заблокирован'}</span>`;let ac='';if(u.id!==user.id){if(u.status==='pending')ac+=`<button class="act-btn success" onclick="activateUser('${u.id}')">Активировать</button>`;if(u.status==='active')ac+=`<button class="act-btn danger" onclick="blockUser('${u.id}')">Блокировать</button>`;if(u.status==='blocked')ac+=`<button class="act-btn success" onclick="activateUser('${u.id}')">Разблокировать</button>`;ac+=`<select class="act-btn" onchange="changeRole('${u.id}',this.value)" style="cursor:pointer">${Object.entries(rl).map(([k,v])=>`<option value="${k}" ${u.role===k?'selected':''}>${v}</option>`).join('')}</select>`}return`<div class="user-card"><div class="uc-avatar">${ini.toUpperCase()||'?'}</div><div class="uc-info"><div class="uc-name">${esc(fn)||u.email}</div><div class="uc-meta"><span>${u.email}</span><span>${u.phone||'—'}</span>${rb} ${sb2}</div></div><div class="uc-actions">${ac}</div></div>`}).join('')}
window.activateUser=async function(id){try{const{error}=await sb.from('users').update({status:'active'}).eq('id',id);if(error)throw error;logAction('user.activate','user',id);showToast('Активирован','success');loadU()}catch(e){showToast(e.message,'error')}};
window.blockUser=async function(id){if(!confirm('Заблокировать?'))return;try{const{error}=await sb.from('users').update({status:'blocked'}).eq('id',id);if(error)throw error;logAction('user.block','user',id);showToast('Заблокирован','warning');loadU()}catch(e){showToast(e.message,'error')}};
window.changeRole=async function(id,r){try{const{error}=await sb.from('users').update({role:r}).eq('id',id);if(error)throw error;logAction('user.role_change','user',id,{new_role:r});showToast('Роль изменена','success');loadU()}catch(e){showToast(e.message,'error')}};
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}})();
</script>
</div>
