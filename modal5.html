<!-- modal5.html — Аналитика (super_admin) -->
<div class="m-root" id="m5Root">
<style>
  .m-root{display:flex;flex-direction:column;height:100%;font-family:inherit;overflow:hidden}
  .m-header{display:flex;justify-content:space-between;align-items:center;height:44px;min-height:44px;padding:0 14px;border-bottom:1px solid var(--border)}
  .m-header-title{font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--fg2)}
  .m-body{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px}
  .stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px}
  .mini-stat{background:var(--inset);border:1px solid var(--border-lt);border-radius:6px;padding:12px;text-align:center}.mini-stat .val{font-size:22px;font-weight:700}.mini-stat .lbl{font-size:10px;color:var(--fg3);margin-top:1px;text-transform:uppercase;font-weight:600}
  .controls{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .ctrl-select{padding:7px 10px;font-size:11px;border:1px solid var(--border);border-radius:6px;background:var(--inset);color:var(--fg);outline:none;font-family:inherit;cursor:pointer}.ctrl-select:focus{border-color:var(--accent)}
  .ctrl-btn{padding:7px 14px;font-size:11px;font-weight:600;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer;transition:all .15s}.ctrl-btn:hover{background:var(--accent-h)}
  .ctrl-btn.outline{background:transparent;color:var(--fg2);border:1px solid var(--border)}.ctrl-btn.outline:hover{border-color:var(--accent);color:var(--fg)}
  .table-wrap{flex:1;overflow:auto;border:1px solid var(--border);border-radius:var(--r);background:var(--panel)}
  .log-table{width:100%;border-collapse:collapse}
  .log-table th{text-align:left;padding:8px 10px;font-size:10px;font-weight:700;color:var(--fg3);text-transform:uppercase;border-bottom:2px solid var(--border);background:var(--inset);position:sticky;top:0;z-index:1}
  .log-table td{padding:8px 10px;font-size:11px;color:var(--fg2);border-bottom:1px solid var(--border-lt);vertical-align:top}
  .log-table tr:hover td{background:var(--inset)}
  .log-type{font-size:10px;font-weight:600;padding:2px 6px;border-radius:3px;background:var(--accent-s);color:var(--fg)}
  .log-details{font-size:10px;color:var(--fg3);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pagination{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--fg3)}
  .empty{text-align:center;padding:30px 16px;color:var(--fg3);font-size:12px}
</style>
<header class="m-header"><div class="m-header-title">Аналитика</div></header>
<div class="m-body" id="m5Body"><div class="empty">Загрузка...</div></div>
<script>
(function(){const sb=window.supabaseClient,user=window.currentUser;if(!sb||!user)return;if(user.role!=='super_admin'){document.getElementById('m5Body').innerHTML='<div class="empty">Нет доступа</div>';return}const body=document.getElementById('m5Body');let logs=[],allU=[],fA='',fU='';const PS=50;let pg=0;init();
async function init(){body.innerHTML='<div class="empty">Загрузка...</div>';try{const{data:us}=await sb.from('users').select('id,first_name,last_name,role').order('last_name');allU=us||[];const now=new Date(),td=new Date(now.getFullYear(),now.getMonth(),now.getDate()).toISOString(),wa=new Date(now.getTime()-7*864e5).toISOString(),ma=new Date(now.getTime()-30*864e5).toISOString();const[{count:cT},{count:cW},{count:cM},{count:cA}]=await Promise.all([sb.from('action_logs').select('id',{count:'exact',head:true}).gte('created_at',td),sb.from('action_logs').select('id',{count:'exact',head:true}).gte('created_at',wa),sb.from('action_logs').select('id',{count:'exact',head:true}).gte('created_at',ma),sb.from('action_logs').select('id',{count:'exact',head:true})]);
body.innerHTML=`<div class="stats-row"><div class="mini-stat"><div class="val">${cT||0}</div><div class="lbl">Сегодня</div></div><div class="mini-stat"><div class="val">${cW||0}</div><div class="lbl">Неделя</div></div><div class="mini-stat"><div class="val">${cM||0}</div><div class="lbl">Месяц</div></div><div class="mini-stat"><div class="val">${cA||0}</div><div class="lbl">Всего</div></div></div><div class="controls"><select class="ctrl-select" id="fAS"><option value="">Все действия</option><option value="user.login">Вход</option><option value="user.logout">Выход</option><option value="deal.create">Создание сделки</option><option value="deal.status_change">Статус сделки</option><option value="review.create">Создание отзыва</option><option value="task.take">Взятие задания</option><option value="task.complete">Завершение</option><option value="brief.submit">Бриф</option><option value="user.activate">Активация</option></select><select class="ctrl-select" id="fUS"><option value="">Все пользователи</option>${allU.map(u=>`<option value="${u.id}">${u.last_name} ${u.first_name}</option>`).join('')}</select><button class="ctrl-btn" onclick="applyF()">Применить</button><button class="ctrl-btn outline" onclick="resetF()">Сброс</button></div><div class="table-wrap" id="tW"></div><div class="pagination" id="lP"></div>`;loadL()}catch(e){body.innerHTML=`<div class="empty" style="color:var(--err)">${e.message}</div>`}}
async function loadL(){const w=document.getElementById('tW');w.innerHTML='<div class="empty">Загрузка...</div>';try{let q=sb.from('action_logs').select('*',{count:'exact'}).order('created_at',{ascending:false}).range(pg*PS,(pg+1)*PS-1);if(fA)q=q.eq('action_type',fA);if(fU)q=q.eq('user_id',fU);const{data,error,count}=await q;if(error)throw error;logs=data||[];if(!logs.length){w.innerHTML='<div class="empty">Пусто</div>';return}const gn=uid=>{const u=allU.find(x=>x.id===uid);return u?`${u.last_name} ${u.first_name}`:'—'};w.innerHTML=`<table class="log-table"><thead><tr><th>Дата</th><th>Пользователь</th><th>Роль</th><th>Действие</th><th>Сущность</th><th>Детали</th></tr></thead><tbody>${logs.map(l=>`<tr><td style="white-space:nowrap">${new Date(l.created_at).toLocaleString('ru-RU')}</td><td>${gn(l.user_id)}</td><td>${l.user_role||'—'}</td><td><span class="log-type">${l.action_type}</span></td><td>${l.entity_type||'—'}</td><td class="log-details" title="${esc(JSON.stringify(l.details||{}))}">${l.details?JSON.stringify(l.details).slice(0,50):'—'}</td></tr>`).join('')}</tbody></table>`;const tp=Math.ceil((count||0)/PS);document.getElementById('lP').innerHTML=`<span>Стр. ${pg+1}/${tp} (${count})</span><div style="display:flex;gap:4px"><button class="ctrl-btn outline" ${pg===0?'disabled':''} onclick="logPg(${pg-1})">←</button><button class="ctrl-btn outline" ${pg>=tp-1?'disabled':''} onclick="logPg(${pg+1})">→</button></div>`}catch(e){w.innerHTML=`<div class="empty" style="color:var(--err)">${e.message}</div>`}}
window.applyF=function(){fA=document.getElementById('fAS').value;fU=document.getElementById('fUS').value;pg=0;loadL()};window.resetF=function(){document.getElementById('fAS').value='';document.getElementById('fUS').value='';fA='';fU='';pg=0;loadL()};window.logPg=function(p){pg=p;loadL()};
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}})();
</script>
</div>
