<!-- modal2.html — Сделки (admin/manager) | Мои сделки (client) | Мои задания (author) -->
<div class="m-root" id="m2Root">
<style>
  .m-root{display:flex;flex-direction:column;height:100%;font-family:inherit;overflow:hidden}
  .m-header{display:flex;justify-content:space-between;align-items:center;height:44px;min-height:44px;padding:0 14px;border-bottom:1px solid var(--border);gap:10px;flex-wrap:wrap}
  .m-header-title{font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--fg2)}
  .m-body{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px}
  .btn-create{padding:8px 16px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px;transition:all .15s;white-space:nowrap}
  .btn-create:hover{background:var(--accent-h)}.btn-create svg{width:14px;height:14px}
  .deal-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);padding:16px;display:flex;flex-direction:column;gap:12px;transition:box-shadow .15s}
  .deal-card:hover{box-shadow:var(--sh-s)}
  .dc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap}
  .dc-info{display:flex;flex-direction:column;gap:3px;min-width:0;flex:1}
  .dc-id{font-size:10px;font-weight:700;color:var(--fg3);padding:2px 7px;background:var(--inset);border:1px solid var(--border-lt);border-radius:4px;display:inline-block;width:fit-content}
  .dc-company{font-size:14px;font-weight:600;margin-top:3px}
  .dc-meta{font-size:11px;color:var(--fg2);display:flex;gap:12px;flex-wrap:wrap;margin-top:2px}
  .dc-sum{font-size:22px;font-weight:700;white-space:nowrap}
  .status-chip{display:inline-flex;padding:3px 10px;border-radius:99px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.03em}
  .chip-brief{background:var(--info-bg);color:var(--info)}.chip-approval{background:var(--warn-bg);color:var(--warn)}.chip-work{background:rgba(139,92,246,.07);color:#7C3AED}.chip-done{background:var(--ok-bg);color:var(--ok)}
  .timeline{display:flex;gap:4px;margin-top:2px}.tl-bar{flex:1;height:5px;background:var(--border);border-radius:99px;transition:background .3s}.tl-bar.active{background:var(--accent)}.tl-bar.done{background:var(--ok)}
  .tl-labels{display:flex;gap:4px;margin-top:3px}.tl-label{flex:1;font-size:9px;color:var(--fg3);text-transform:uppercase}.tl-label.active{color:var(--fg);font-weight:600}
  .dc-actions{display:flex;gap:6px;flex-wrap:wrap;padding-top:10px;border-top:1px dashed var(--border)}
  .dc-btn{padding:6px 14px;font-size:11px;font-weight:600;border:1px solid var(--border);border-radius:6px;background:var(--panel);color:var(--fg2);cursor:pointer;transition:all .15s}
  .dc-btn:hover{border-color:var(--accent);color:var(--fg)}.dc-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}.dc-btn.primary:hover{background:var(--accent-h)}.dc-btn:disabled{opacity:.4;cursor:not-allowed}
  .dc-footer{display:flex;justify-content:space-between;align-items:center;font-size:10px;color:var(--fg3);flex-wrap:wrap;gap:6px}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.3);backdrop-filter:blur(3px);z-index:2000;display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:all .25s}
  .modal-bg.open{opacity:1;visibility:visible}
  .modal{background:var(--panel);border:1px solid var(--border);border-radius:var(--rl);width:600px;max-width:calc(100vw - 24px);max-height:90vh;display:flex;flex-direction:column;box-shadow:var(--sh-xl);transform:scale(.97);transition:transform .25s}
  .modal-bg.open .modal{transform:scale(1)}.modal.wide{width:860px}
  .modal-head{display:flex;justify-content:space-between;align-items:center;padding:16px 18px;border-bottom:1px solid var(--border)}
  .modal-head h3{font-size:14px;font-weight:700}
  .modal-close{background:none;border:none;font-size:20px;color:var(--fg3);cursor:pointer;padding:2px}.modal-close:hover{color:var(--fg)}
  .modal-body{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:16px}
  .modal-foot{padding:12px 18px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
  .form-section{font-size:10px;font-weight:700;color:var(--fg3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}@media(max-width:500px){.form-grid{grid-template-columns:1fr}}.form-grid .span2{grid-column:span 2}@media(max-width:500px){.form-grid .span2{grid-column:span 1}}
  .fg{position:relative}.fg input,.fg textarea,.fg select{width:100%;padding:10px 12px;font-size:12px;border:1px solid var(--border);border-radius:6px;background:var(--inset);color:var(--fg);outline:none;font-family:inherit;transition:border-color .15s}.fg input:focus,.fg textarea:focus{border-color:var(--accent)}.fg label{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--fg3);pointer-events:none;transition:all .15s;padding:0 3px}.fg input:focus~label,.fg input:not(:placeholder-shown)~label,.fg textarea:focus~label,.fg textarea:not(:placeholder-shown)~label{top:0;font-size:9px;font-weight:500;color:var(--accent);background:var(--panel)}.fg textarea{resize:none;min-height:60px}
  .ac-drop{position:absolute;top:100%;left:0;right:0;background:var(--panel);border:1px solid var(--border);border-radius:6px;margin-top:3px;box-shadow:var(--sh-l);z-index:10;max-height:160px;overflow-y:auto;display:none}.ac-drop.open{display:block}.ac-item{padding:8px 12px;font-size:11px;cursor:pointer;border-bottom:1px solid var(--border-lt)}.ac-item:last-child{border-bottom:none}.ac-item:hover{background:var(--inset)}
  .review-cols{display:flex;gap:10px;flex:1;min-height:180px}@media(max-width:700px){.review-cols{flex-direction:column}}
  .review-col{flex:1;border:1px solid var(--border);border-radius:6px;background:var(--inset);display:flex;flex-direction:column;overflow:hidden}
  .rc-header{padding:8px 12px;font-size:10px;font-weight:700;text-transform:uppercase;color:var(--fg3);border-bottom:1px solid var(--border-lt);background:var(--panel)}
  .rc-body{flex:1;overflow-y:auto;padding:6px;display:flex;flex-direction:column;gap:5px}
  .rv-item{background:var(--panel);border:1px solid var(--border-lt);border-radius:5px;padding:8px;font-size:11px;color:var(--fg2);line-height:1.5;display:flex;flex-direction:column;gap:5px}
  .rv-item .rv-actions{display:flex;justify-content:flex-end;gap:5px}
  .rv-chip{font-size:9px;font-weight:600;padding:2px 7px;border-radius:4px}.rv-chip.draft{background:var(--inset);color:var(--fg3)}.rv-chip.pending{background:var(--warn-bg);color:var(--warn)}.rv-chip.approved{background:var(--ok-bg);color:var(--ok)}.rv-chip.edited{background:var(--info-bg);color:var(--info)}
  .brief-section{margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border)}.brief-section:last-child{border-bottom:none}.brief-section h4{font-size:13px;font-weight:600;margin-bottom:10px}
  .brief-q{margin-bottom:10px}.brief-q label{display:block;font-size:11px;font-weight:500;color:var(--fg2);margin-bottom:4px}.brief-q textarea{width:100%;padding:8px;border:1px solid var(--border);border-radius:6px;font-family:inherit;font-size:12px;resize:vertical;min-height:50px;background:var(--panel)}.brief-q textarea:focus{border-color:var(--accent);outline:none}
  .cb-group{display:grid;grid-template-columns:1fr 1fr;gap:6px}@media(max-width:500px){.cb-group{grid-template-columns:1fr}}.cb-label{display:flex;align-items:center;gap:6px;font-size:11px;cursor:pointer}
  .empty{text-align:center;padding:30px 16px;color:var(--fg3);font-size:12px}
</style>
<header class="m-header"><div class="m-header-title" id="m2Title">Загрузка...</div><div id="m2HeaderActions"></div></header>
<div class="m-body" id="m2Body"><div class="empty">Загрузка...</div></div>
<div class="modal-bg" id="dealModal"><div class="modal"><div class="modal-head"><h3>Новая сделка</h3><button class="modal-close" onclick="closeDealModal()">&times;</button></div><div class="modal-body"><div><div class="form-section">Контрагент</div><div class="form-grid"><div class="fg" style="position:relative"><input id="dInn" placeholder=" " autocomplete="off"><label>ИНН</label><div class="ac-drop" id="innDrop"></div></div><div class="fg"><input id="dOpf" placeholder=" "><label>ОПФ</label></div><div class="fg span2"><input id="dCompany" placeholder=" "><label>Наименование</label></div></div></div><div><div class="form-section">Клиент</div><div class="form-grid"><div class="fg span2" style="position:relative"><input id="dLname" placeholder=" " autocomplete="off"><label>Фамилия</label><div class="ac-drop" id="clientDrop"></div></div><div class="fg"><input id="dFname" placeholder=" "><label>Имя</label></div><div class="fg"><input id="dMname" placeholder=" "><label>Отчество</label></div><div class="fg"><input id="dPhone" placeholder=" "><label>Телефон</label></div><div class="fg"><input id="dEmail" placeholder=" " type="email"><label>Email</label></div></div></div><div><div class="form-section">Договор</div><div class="form-grid"><div class="fg"><input id="dContractNum" placeholder=" "><label>Номер</label></div><div class="fg"><input id="dContractDate" type="date" placeholder=" " style="padding-top:12px"><label style="top:0;font-size:9px;background:var(--panel)">Дата</label></div><div class="fg"><input id="dSum" placeholder=" " type="number"><label>Сумма</label></div><div class="fg"><input id="dHelp" placeholder=" "><label>Комментарий</label></div></div></div></div><div class="modal-foot"><button class="dc-btn" onclick="closeDealModal()">Отмена</button><button class="dc-btn primary" id="submitDealBtn" onclick="submitDeal()">Создать</button></div></div></div>
<div class="modal-bg" id="reviewModal"><div class="modal wide"><div class="modal-head"><h3>Отзывы по сделке</h3><button class="modal-close" onclick="closeReviewModal()">&times;</button></div><div class="modal-body"><div class="form-grid"><div class="fg span2"><input id="rLink" placeholder=" "><label>Ссылка на площадку</label></div><div class="fg"><input id="rDeadline" type="date" placeholder=" " style="padding-top:12px"><label style="top:0;font-size:9px;background:var(--panel)">Дедлайн</label></div></div><div style="position:relative"><textarea id="rText" style="width:100%;min-height:70px;padding:10px;border:1px solid var(--border);border-radius:6px;font-family:inherit;font-size:12px;resize:none" placeholder="Текст отзыва..."></textarea><button class="dc-btn primary" style="position:absolute;top:6px;right:6px;padding:4px 10px;font-size:10px" onclick="addReviewDraft()">Добавить</button></div><div class="review-cols"><div class="review-col"><div class="rc-header">Черновики</div><div class="rc-body" id="draftCol"></div></div><div class="review-col"><div class="rc-header">У клиента</div><div class="rc-body" id="clientCol"></div></div></div></div><div class="modal-foot"><button class="dc-btn" id="sendApprovalBtn" onclick="sendForApproval()" style="display:none">На согласование</button><button class="dc-btn primary" id="sendToAuthorsBtn" onclick="sendToAuthors()" style="display:none">Передать авторам</button></div></div></div>
<div class="modal-bg" id="briefModal"><div class="modal wide"><div class="modal-head"><h3>Бриф клиента</h3><button class="modal-close" onclick="closeBriefModal()">&times;</button></div><div class="modal-body" id="briefBody"></div><div class="modal-foot"><button class="dc-btn primary" onclick="submitBrief()">Отправить бриф</button></div></div></div>
<div class="modal-bg" id="approvalModal"><div class="modal wide"><div class="modal-head"><h3>Согласование отзывов</h3><button class="modal-close" onclick="closeApprovalModal()">&times;</button></div><div class="modal-body"><div class="review-cols"><div class="review-col"><div class="rc-header">На согласовании</div><div class="rc-body" id="pendingCol"></div></div><div class="review-col"><div class="rc-header">Согласовано</div><div class="rc-body" id="approvedCol"></div></div></div></div></div></div>
<script>
(function(){const sb=window.supabaseClient,user=window.currentUser;if(!sb||!user)return;const title=document.getElementById('m2Title'),body=document.getElementById('m2Body'),actions=document.getElementById('m2HeaderActions');let currentDealId=null;if(user.role==='author')renderAuthorTasks();else renderDeals();
const SM={brief:'Бриф',brief_completed:'Бриф готов',review_creation:'Создание отзывов',approval:'Согласование',in_work:'В работе',completed:'Завершена',cancelled:'Отменена'},ST=['brief','review_creation','approval','in_work','completed'];
function statusChip(s){const c=s==='completed'?'chip-done':['in_work'].includes(s)?'chip-work':['approval','pending_approval','review_creation','brief_completed'].includes(s)?'chip-approval':'chip-brief';return`<span class="status-chip ${c}">${SM[s]||s}</span>`}
function timelineHTML(s){const i=ST.indexOf(s),ri=s==='brief_completed'?1:i;return`<div class="timeline">${ST.map((_,j)=>`<div class="tl-bar ${j<ri?'done':j===ri?'active':''}"></div>`).join('')}</div><div class="tl-labels">${['Бриф','Отзывы','Согл.','Работа','Готово'].map((l,j)=>`<span class="tl-label ${j===ri?'active':''}">${l}</span>`).join('')}</div>`}
async function renderDeals(){const isCl=user.role==='client',isA=user.role==='super_admin';title.textContent=isCl?'Мои сделки':'Сделки';if(!isCl)actions.innerHTML=`<button class="btn-create" onclick="openDealModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Создать</button>`;else actions.innerHTML='';body.innerHTML='<div class="empty">Загрузка...</div>';try{let q=sb.from('deals').select('*, clients:client_id(first_name,last_name,middle_name,user_id), counterparties:counterparty_id(name_company,opf,inn)').order('created_at',{ascending:false});if(user.role==='manager')q=q.eq('manager_id',user.id);if(isCl){const{data:mc}=await sb.from('clients').select('id').eq('user_id',user.id);const ci=(mc||[]).map(c=>c.id);if(ci.length>0)q=q.in('client_id',ci);else{body.innerHTML='<div class="empty">Нет сделок</div>';return}}const{data:deals,error}=await q;if(error)throw error;if(!deals?.length){body.innerHTML='<div class="empty">Сделок нет</div>';return}const di=deals.map(d=>d.id);const{data:rv}=await sb.from('reviews').select('id,deal_id,status').in('deal_id',di);const rm={};(rv||[]).forEach(r=>{if(!rm[r.deal_id])rm[r.deal_id]=[];rm[r.deal_id].push(r)});body.innerHTML='';deals.forEach(d=>{const el=document.createElement('div');el.className='deal-card';const c=d.clients,cp=d.counterparties,fio=c?`${c.last_name||''} ${c.first_name||''} ${c.middle_name||''}`.trim():'—',co=cp?`${cp.opf||''} ${cp.name_company||''}`.trim():'—',dr=rm[d.id]||[],pc=dr.filter(r=>r.status==='pending_approval').length,ac=dr.filter(r=>['approved','client_edited'].includes(r.status)).length;let ah='';if(isCl){if(d.status==='brief'&&d.is_new_client)ah+=`<button class="dc-btn primary" onclick="openBriefModal('${d.id}')">Пройти бриф</button>`;if(pc>0)ah+=`<button class="dc-btn primary" onclick="openApprovalModal('${d.id}')">Согласовать (${pc})</button>`}else{if(['brief_completed','review_creation','approval'].includes(d.status))ah+=`<button class="dc-btn primary" onclick="openReviewModal('${d.id}')">Отзывы</button>`;if(d.status==='brief'&&!d.is_new_client)ah+=`<button class="dc-btn primary" onclick="advanceDeal('${d.id}','review_creation')">К отзывам</button>`;if(d.status==='brief'&&d.brief_data)ah+=`<button class="dc-btn" onclick="advanceDeal('${d.id}','review_creation')">Бриф получен →</button>`;if(ac>0&&d.status==='approval')ah+=`<button class="dc-btn primary" onclick="publishForAuthors('${d.id}')">Авторам (${ac})</button>`}el.innerHTML=`<div class="dc-top"><div class="dc-info"><div class="dc-id">#${d.deal_number} · ${d.contract_number||'б/н'}</div><div class="dc-company">${esc(co)}</div><div class="dc-meta"><span>${esc(fio)}</span><span>ИНН ${cp?.inn||'—'}</span><span>${d.contract_date?new Date(d.contract_date).toLocaleDateString('ru-RU'):'—'}</span></div></div><div style="text-align:right"><div class="dc-sum">${formatMoney(d.sum_deal)} ₽</div>${statusChip(d.status)}</div></div>${timelineHTML(d.status)}${ah?`<div class="dc-actions">${ah}</div>`:''}<div class="dc-footer"><span>${formatDate(d.created_at)}</span><span>Отзывов: ${dr.length}</span></div>`;body.appendChild(el)})}catch(e){body.innerHTML=`<div class="empty" style="color:var(--err)">Ошибка: ${e.message}</div>`}}
window.openDealModal=function(){document.getElementById('dealModal').classList.add('open')};window.closeDealModal=function(){document.getElementById('dealModal').classList.remove('open')};
let innT;document.getElementById('dInn').addEventListener('input',e=>{clearTimeout(innT);const v=e.target.value;if(v.length<2){document.getElementById('innDrop').classList.remove('open');return}innT=setTimeout(async()=>{const{data}=await sb.from('counterparties').select('*').ilike('inn',`%${v}%`).limit(5);const dr=document.getElementById('innDrop');if(data?.length){dr.innerHTML=data.map(c=>`<div class="ac-item" data-inn="${c.inn}" data-opf="${c.opf||''}" data-name="${c.name_company||''}">${c.inn} — ${c.name_company||''}</div>`).join('');dr.classList.add('open');dr.querySelectorAll('.ac-item').forEach(i=>i.onclick=()=>{document.getElementById('dInn').value=i.dataset.inn;document.getElementById('dOpf').value=i.dataset.opf;document.getElementById('dCompany').value=i.dataset.name;dr.classList.remove('open')})}else dr.classList.remove('open')},300)});
let clT;document.getElementById('dLname').addEventListener('input',e=>{clearTimeout(clT);const v=e.target.value;if(v.length<2){document.getElementById('clientDrop').classList.remove('open');return}clT=setTimeout(async()=>{const{data}=await sb.from('clients').select('*').ilike('last_name',`%${v}%`).limit(5);const dr=document.getElementById('clientDrop');if(data?.length){dr.innerHTML=data.map(c=>`<div class="ac-item" data-fn="${c.first_name||''}" data-ln="${c.last_name||''}" data-mn="${c.middle_name||''}" data-ph="${c.phone||''}" data-em="${c.email||''}">${c.last_name} ${c.first_name} ${c.middle_name||''}</div>`).join('');dr.classList.add('open');dr.querySelectorAll('.ac-item').forEach(i=>i.onclick=()=>{document.getElementById('dLname').value=i.dataset.ln;document.getElementById('dFname').value=i.dataset.fn;document.getElementById('dMname').value=i.dataset.mn;document.getElementById('dPhone').value=i.dataset.ph;document.getElementById('dEmail').value=i.dataset.em;dr.classList.remove('open')})}else dr.classList.remove('open')},300)});
document.addEventListener('click',e=>{if(!e.target.closest('#dInn')&&!e.target.closest('#innDrop'))document.getElementById('innDrop').classList.remove('open');if(!e.target.closest('#dLname')&&!e.target.closest('#clientDrop'))document.getElementById('clientDrop').classList.remove('open')});
window.submitDeal=async function(){const btn=document.getElementById('submitDealBtn');btn.disabled=true;btn.textContent='...';try{const inn=document.getElementById('dInn').value.trim(),ln=document.getElementById('dLname').value.trim(),fn=document.getElementById('dFname').value.trim(),em=document.getElementById('dEmail').value.trim();if(!inn)throw new Error('ИНН обязателен');if(!ln||!fn)throw new Error('ФИО обязательно');let{data:cp}=await sb.from('counterparties').select('id').eq('inn',inn).maybeSingle();if(!cp){const{data:nc,error:ce}=await sb.from('counterparties').insert({inn,opf:document.getElementById('dOpf').value.trim(),name_company:document.getElementById('dCompany').value.trim()}).select('id').single();if(ce)throw ce;cp=nc}let isNew=true;let{data:cl}=await sb.from('clients').select('id,user_id').eq('last_name',ln).eq('first_name',fn).maybeSingle();if(cl){isNew=false;await sb.from('clients').update({phone:document.getElementById('dPhone').value.trim(),email:em}).eq('id',cl.id)}else{const tp=Math.random().toString(36).slice(-8);const{data:nu,error:ue}=await sb.from('users').insert({email:em,password_hash:tp,role:'client',status:'active',first_name:fn,last_name:ln,middle_name:document.getElementById('dMname').value.trim(),phone:document.getElementById('dPhone').value.trim(),must_change_password:true}).select('id').single();if(ue&&ue.code!=='23505')throw ue;const uid=nu?nu.id:null;const{data:nc,error:ce}=await sb.from('clients').insert({user_id:uid,counterparty_id:cp.id,first_name:fn,last_name:ln,middle_name:document.getElementById('dMname').value.trim(),phone:document.getElementById('dPhone').value.trim(),email:em}).select('id').single();if(ce)throw ce;cl=nc}const is=isNew?'brief':'review_creation';const{error:de}=await sb.from('deals').insert({manager_id:user.id,client_id:cl.id,counterparty_id:cp.id,contract_number:document.getElementById('dContractNum').value.trim(),contract_date:document.getElementById('dContractDate').value||null,sum_deal:parseFloat(document.getElementById('dSum').value)||0,help_text:document.getElementById('dHelp').value.trim(),status:is,is_new_client:isNew});if(de)throw de;logAction('deal.create','deal',null,{inn,client:ln+' '+fn});showToast('Сделка создана','success');closeDealModal();renderDeals()}catch(e){showToast('Ошибка: '+e.message,'error')}finally{btn.disabled=false;btn.textContent='Создать'}};
window.advanceDeal=async function(id,ns){try{const{error}=await sb.from('deals').update({status:ns}).eq('id',id);if(error)throw error;logAction('deal.status_change','deal',id,{new_status:ns});renderDeals()}catch(e){showToast('Ошибка: '+e.message,'error')}};
window.openReviewModal=async function(di){currentDealId=di;document.getElementById('reviewModal').classList.add('open');document.getElementById('draftCol').innerHTML='';document.getElementById('clientCol').innerHTML='';document.getElementById('rText').value='';await loadReviews(di)};window.closeReviewModal=function(){document.getElementById('reviewModal').classList.remove('open')};
async function loadReviews(di){const{data}=await sb.from('reviews').select('*').eq('deal_id',di).order('created_at');const dc=document.getElementById('draftCol'),cc=document.getElementById('clientCol');dc.innerHTML='';cc.innerHTML='';(data||[]).forEach(r=>{const ch=r.status==='draft'?'draft':r.status==='approved'?'approved':r.status==='client_edited'?'edited':'pending';const ct=r.status==='draft'?'Черновик':r.status==='approved'?'Согласован':r.status==='client_edited'?'Изменён':'На согл.';const h=`<div class="rv-item"><div style="flex:1">${esc(r.review_text)}</div><div class="rv-actions"><span class="rv-chip ${ch}">${ct}</span></div></div>`;if(['draft','approved','client_edited'].includes(r.status))dc.innerHTML+=h;else if(r.status==='pending_approval')cc.innerHTML+=h});const dr=(data||[]).filter(r=>r.status==='draft'),ap=(data||[]).filter(r=>['approved','client_edited'].includes(r.status));document.getElementById('sendApprovalBtn').style.display=dr.length?'block':'none';document.getElementById('sendToAuthorsBtn').style.display=ap.length?'block':'none'}
window.addReviewDraft=async function(){const t=document.getElementById('rText').value.trim();if(!t||!currentDealId)return;try{const{error}=await sb.from('reviews').insert({deal_id:currentDealId,review_text:t,platform_link:document.getElementById('rLink').value.trim(),deadline:document.getElementById('rDeadline').value||null,status:'draft'});if(error)throw error;document.getElementById('rText').value='';logAction('review.create','review',null,{deal_id:currentDealId});loadReviews(currentDealId)}catch(e){showToast('Ошибка: '+e.message,'error')}};
window.sendForApproval=async function(){try{const{error}=await sb.from('reviews').update({status:'pending_approval'}).eq('deal_id',currentDealId).eq('status','draft');if(error)throw error;await sb.from('deals').update({status:'approval'}).eq('id',currentDealId);logAction('review.send_for_approval','deal',currentDealId);showToast('Отправлено','success');loadReviews(currentDealId)}catch(e){showToast('Ошибка: '+e.message,'error')}};
window.sendToAuthors=async function(){try{const{error}=await sb.from('reviews').update({status:'available'}).eq('deal_id',currentDealId).in('status',['approved','client_edited']);if(error)throw error;await sb.from('deals').update({status:'in_work'}).eq('id',currentDealId);logAction('review.send_to_authors','deal',currentDealId);showToast('Передано','success');closeReviewModal();renderDeals()}catch(e){showToast('Ошибка: '+e.message,'error')}};
window.publishForAuthors=async function(di){try{const{error}=await sb.from('reviews').update({status:'available'}).eq('deal_id',di).in('status',['approved','client_edited']);if(error)throw error;await sb.from('deals').update({status:'in_work'}).eq('id',di);logAction('review.publish_for_authors','deal',di);showToast('Передано авторам','success');renderDeals()}catch(e){showToast('Ошибка: '+e.message,'error')}};
window.openBriefModal=async function(di){currentDealId=di;const bb=document.getElementById('briefBody');bb.innerHTML='<div class="empty">Загрузка...</div>';document.getElementById('briefModal').classList.add('open');const{data:t}=await sb.from('brief_templates').select('sections').eq('is_active',true).limit(1).single();if(!t){bb.innerHTML='<div class="empty">Шаблон не найден</div>';return}bb.innerHTML=t.sections.map((s,si)=>{const qs=s.questions.map((q,qi)=>{if(q.type==='checkbox_group')return`<div class="brief-q"><label>${q.label}</label><div class="cb-group">${(q.options||[]).map(o=>`<label class="cb-label"><input type="checkbox" name="brief_cb_${si}_${qi}" value="${o}"> ${o}</label>`).join('')}</div></div>`;return`<div class="brief-q"><label>${q.label}</label><textarea name="brief_${q.key}" placeholder="Ответ..."></textarea></div>`}).join('');return`<div class="brief-section"><h4>${s.title}</h4>${qs}</div>`}).join('')};
window.closeBriefModal=function(){document.getElementById('briefModal').classList.remove('open')};
window.submitBrief=async function(){const f=document.getElementById('briefBody'),d={};f.querySelectorAll('textarea').forEach(t=>{if(t.name)d[t.name]=t.value});f.querySelectorAll('input[type=checkbox]').forEach(c=>{if(!d[c.name])d[c.name]=[];if(c.checked)d[c.name].push(c.value)});try{const{error}=await sb.from('deals').update({brief_data:d,brief_submitted_at:new Date().toISOString(),status:'brief_completed'}).eq('id',currentDealId);if(error)throw error;logAction('brief.submit','deal',currentDealId);showToast('Бриф отправлен','success');closeBriefModal();renderDeals()}catch(e){showToast('Ошибка: '+e.message,'error')}};
window.openApprovalModal=async function(di){currentDealId=di;document.getElementById('approvalModal').classList.add('open');const p=document.getElementById('pendingCol'),a=document.getElementById('approvedCol');p.innerHTML='';a.innerHTML='';const{data}=await sb.from('reviews').select('*').eq('deal_id',di).in('status',['pending_approval','approved','client_edited']);(data||[]).forEach(r=>{if(r.status==='pending_approval'){const d=document.createElement('div');d.className='rv-item';d.innerHTML=`<div style="flex:1">${esc(r.review_text)}</div><div class="rv-actions"><button class="dc-btn" onclick="editReview(this,'${r.id}')">Изменить</button><button class="dc-btn primary" onclick="approveReview('${r.id}',this)">Согласовать</button></div>`;p.appendChild(d)}else a.innerHTML+=`<div class="rv-item"><div style="flex:1">${esc(r.review_text)}</div><div class="rv-actions"><span class="rv-chip approved">Согласован</span></div></div>`})};
window.closeApprovalModal=function(){document.getElementById('approvalModal').classList.remove('open')};
window.approveReview=async function(id,b){b.disabled=true;try{const{error}=await sb.from('reviews').update({status:'approved'}).eq('id',id);if(error)throw error;logAction('review.approve','review',id);openApprovalModal(currentDealId)}catch(e){showToast('Ошибка: '+e.message,'error')}};
window.editReview=function(b,id){const it=b.closest('.rv-item'),td=it.querySelector('div'),ot=td.textContent,ad=it.querySelector('.rv-actions');td.innerHTML=`<textarea style="width:100%;min-height:50px;padding:6px;border:1px solid var(--accent);border-radius:5px;font-family:inherit;font-size:11px">${ot}</textarea>`;ad.innerHTML=`<button class="dc-btn" onclick="openApprovalModal('${currentDealId}')">Отмена</button><button class="dc-btn primary" onclick="saveReviewEdit('${id}',this)">Сохранить</button>`;td.querySelector('textarea').focus()};
window.saveReviewEdit=async function(id,b){const it=b.closest('.rv-item'),nt=it.querySelector('textarea').value.trim();if(!nt)return;try{const{error}=await sb.from('reviews').update({review_text:nt,status:'client_edited'}).eq('id',id);if(error)throw error;logAction('review.client_edit','review',id);showToast('Сохранено','success');openApprovalModal(currentDealId)}catch(e){showToast('Ошибка: '+e.message,'error')}};
async function renderAuthorTasks(){title.textContent='Мои задания';actions.innerHTML='';body.innerHTML='<div class="empty">Загрузка...</div>';try{const{data,error}=await sb.from('reviews').select('*, deals:deal_id(deal_number,contract_number)').eq('assigned_author_id',user.id).not('status','in','(available,draft,pending_approval,client_edited,approved,cancelled)').order('created_at',{ascending:false});if(error)throw error;if(!data?.length){body.innerHTML='<div class="empty">Нет заданий. Возьмите на доске.</div>';return}body.innerHTML='';data.forEach(t=>{const el=document.createElement('div');el.className='deal-card';const dom=t.platform_link?new URL(t.platform_link).hostname.replace('www.',''):'—';const sl={in_progress:'В работе',contact_made:'Контакт',review_posted:'Отзыв',completed:'Завершено'};let st=1;if(t.status==='contact_made')st=2;if(t.status==='review_posted')st=3;if(t.status==='completed')st=4;let ah='';if(st===1)ah=`<button class="dc-btn primary" onclick="uploadScreenshot('${t.id}','contact')">Скриншот контакта</button>`;else if(st===2){const n=new Date(),p=new Date(t.contact_pause_until);if(n<p){const d=p-n,h=Math.floor(d/3600000),m=Math.floor((d%3600000)/60000);ah=`<span style="color:var(--warn);font-weight:600;font-size:12px">Пауза: ${h}ч ${m}м</span>`}else ah=`<button class="dc-btn primary" onclick="uploadScreenshot('${t.id}','review')">Скриншот отзыва</button>`}else if(st===3){const n=new Date(),p=new Date(t.review_pause_until);if(n<p){const d=p-n,h=Math.floor(d/3600000),m=Math.floor((d%3600000)/60000);ah=`<span style="color:var(--warn);font-weight:600;font-size:12px">Пауза: ${h}ч ${m}м</span>`}else ah=`<button class="dc-btn primary" onclick="completeTask('${t.id}')">Закрыть (скриншот)</button>`}else ah='<span style="color:var(--ok);font-weight:600;font-size:12px">Выполнено ✓</span>';const bars=[1,2,3].map(i=>`<div class="tl-bar ${i<st?'done':i===st?'active':''}"></div>`).join(''),lbs=['Контакт','Отзыв','Закрытие'].map((l,i)=>`<span class="tl-label ${i===st-1?'active':''}">${l}</span>`).join('');el.innerHTML=`<div class="dc-top"><div class="dc-info"><div class="dc-id">#${t.deals?.contract_number||t.deals?.deal_number||'—'}</div><div class="dc-company">${dom}</div><div class="dc-meta"><span>${sl[t.status]||t.status}</span><span>до ${t.deadline?new Date(t.deadline).toLocaleDateString('ru-RU'):'—'}</span></div></div></div><div style="background:var(--inset);border:1px solid var(--border-lt);border-radius:6px;padding:10px;font-size:11px;color:var(--fg2);line-height:1.5">${esc(t.review_text)}</div><div class="timeline">${bars}</div><div class="tl-labels">${lbs}</div><div class="dc-actions">${ah}</div>`;body.appendChild(el)})}catch(e){body.innerHTML=`<div class="empty" style="color:var(--err)">Ошибка: ${e.message}</div>`}}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
document.querySelectorAll('.modal-bg').forEach(b=>{b.addEventListener('click',e=>{if(e.target===b)b.classList.remove('open')})})})();
</script>
</div>
