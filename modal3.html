<!-- modal3.html — Отзывы (admin/manager) |  Статус задач (client) | Результаты (author) -->
<div class="m-root" id="m3Root">
<style>
  .m-root{display:flex;flex-direction:column;height:100%;font-family:'SN Pro',sans-serif;overflow:hidden}
  .m-header{display:flex;justify-content:space-between;align-items:center;height:52px;min-height:52px;padding:0 20px;border-bottom:1px solid var(--border);background:var(--bg-secondary);gap:12px}
  .m-header-title{font-size:14px;font-weight:700;letter-spacing:0.03em;text-transform:uppercase;color:var(--fg)}
  .m-body{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px}

  /* Filters */
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px}
  .filter-btn{padding:6px 14px;font-size:12px;font-weight:600;border:1px solid var(--border);border-radius:99px;background:var(--bg-secondary);color:var(--fg-muted);cursor:pointer;transition:all 0.2s}
  .filter-btn:hover{border-color:var(--fg-muted);color:var(--fg-secondary)}
  .filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

  /* Review table/cards */
  .rv-card{display:flex;gap:16px;padding:16px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-md);transition:box-shadow 0.2s;align-items:flex-start}
  .rv-card:hover{box-shadow:var(--shadow-sm)}
  @media(max-width:700px){.rv-card{flex-direction:column}}
  .rv-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:6px}
  .rv-text{font-size:13px;color:var(--fg-secondary);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .rv-text.full{-webkit-line-clamp:unset}
  .rv-meta{font-size:11px;color:var(--fg-muted);display:flex;gap:12px;flex-wrap:wrap}
  .rv-right{display:flex;flex-direction:column;gap:6px;align-items:flex-end;flex-shrink:0}
  .rv-status{font-size:10px;font-weight:700;padding:4px 10px;border-radius:99px;text-transform:uppercase}
  .rv-status.draft{background:var(--bg);color:var(--fg-muted)}
  .rv-status.pending{background:var(--warning-bg);color:var(--warning)}
  .rv-status.approved{background:var(--success-bg);color:var(--success)}
  .rv-status.available{background:var(--info-bg);color:var(--info)}
  .rv-status.progress{background:rgba(139,92,246,0.08);color:#7C3AED}
  .rv-status.completed{background:var(--success-bg);color:var(--success)}

  /* Stats cards (author) */
  .stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:8px}
  .stat-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-md);padding:20px;text-align:center}
  .stat-card .val{font-size:32px;font-weight:700;color:var(--fg)}
  .stat-card .lbl{font-size:12px;color:var(--fg-muted);margin-top:4px;text-transform:uppercase;font-weight:600}

  /* Client status: contact indicator */
  .contact-alert{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--info-bg);border:1px solid rgba(37,99,235,0.15);border-radius:var(--radius-sm);font-size:13px;color:var(--info);margin-bottom:4px}
  .contact-alert svg{width:20px;height:20px;flex-shrink:0}

  .empty{text-align:center;padding:40px 20px;color:var(--fg-muted);font-size:13px}
</style>

<header class="m-header">
  <div class="m-header-title" id="m3Title">Загрузка...</div>
</header>

<div class="m-body" id="m3Body">
  <div class="empty">Загрузка...</div>
</div>

<script>
(function(){
  const sb = window.supabaseClient;
  const user = window.currentUser;
  if(!sb||!user) return;

  const title = document.getElementById('m3Title');
  const body = document.getElementById('m3Body');

  if(user.role==='author') renderAuthorResults();
  else if(user.role==='client') renderClientStatus();
  else renderReviewsList();

  /* STATUS LABELS */
  const SL = {
    draft:'Черновик', pending_approval:'На согласовании', client_edited:'Изменён',
    approved:'Согласован', available:'Доступен', in_progress:'В работе',
    contact_made:'Контакт', review_posted:'Отзыв', completed:'Выполнен', cancelled:'Отменён'
  };

  function statusClass(s){
    if(s==='completed') return 'completed';
    if(['in_progress','contact_made','review_posted'].includes(s)) return 'progress';
    if(s==='available') return 'available';
    if(['approved','client_edited'].includes(s)) return 'approved';
    if(s==='pending_approval') return 'pending';
    return 'draft';
  }

  /* ===== REVIEWS LIST (admin/manager) ===== */
  async function renderReviewsList(){
    title.textContent = 'Задания / Отзывы';
    body.innerHTML='<div class="empty">Загрузка...</div>';

    try{
      const isAdmin = user.role==='super_admin';
      let q = sb.from('reviews').select('*, deals:deal_id(deal_number,contract_number,manager_id), author:assigned_author_id(first_name,last_name)').order('created_at',{ascending:false});

      if(!isAdmin){
        /* get manager's deal ids first */
        const {data:myDeals}=await sb.from('deals').select('id').eq('manager_id',user.id);
        const ids=(myDeals||[]).map(d=>d.id);
        if(ids.length>0) q=q.in('deal_id',ids);
        else{body.innerHTML='<div class="empty">Нет заданий</div>';return;}
      }

      const {data:reviews,error}=await q;
      if(error) throw error;

      /* Filters */
      const allStatuses = [...new Set((reviews||[]).map(r=>r.status))];
      let currentFilter = 'all';

      function render(filter){
        currentFilter=filter;
        const filtered = filter==='all'?reviews:(reviews||[]).filter(r=>r.status===filter);
        body.innerHTML=`
          <div class="filters">
            <button class="filter-btn ${filter==='all'?'active':''}" onclick="filterRevs('all')">Все (${(reviews||[]).length})</button>
            ${allStatuses.map(s=>{const cnt=(reviews||[]).filter(r=>r.status===s).length;return`<button class="filter-btn ${filter===s?'active':''}" onclick="filterRevs('${s}')">${SL[s]||s} (${cnt})</button>`;}).join('')}
          </div>
          <div id="revsList"></div>
        `;
        const list=document.getElementById('revsList');
        if(filtered.length===0){list.innerHTML='<div class="empty">Нет заданий с таким статусом</div>';return;}
        list.innerHTML = filtered.map(r=>{
          const domain = r.platform_link?new URL(r.platform_link).hostname.replace('www.',''):'—';
          const authorName = r.author?`${r.author.first_name} ${r.author.last_name}`:'Не назначен';
          const dealLabel = r.deals?`#${r.deals.contract_number||r.deals.deal_number}`:'—';
          return `<div class="rv-card">
            <div class="rv-body">
              <div class="rv-text">${esc(r.review_text)}</div>
              <div class="rv-meta">
                <span>Сделка ${dealLabel}</span>
                <span>${domain}</span>
                <span>Автор: ${authorName}</span>
                <span>${r.deadline?'до '+new Date(r.deadline).toLocaleDateString('ru-RU'):''}</span>
              </div>
            </div>
            <div class="rv-right">
              <span class="rv-status ${statusClass(r.status)}">${SL[r.status]||r.status}</span>
              <span style="font-size:11px;color:var(--fg-muted)">${new Date(r.created_at).toLocaleDateString('ru-RU')}</span>
            </div>
          </div>`;
        }).join('');
      }

      window.filterRevs = function(f){ render(f); };
      render('all');

    }catch(e){body.innerHTML=`<div class="empty" style="color:var(--error)">Ошибка: ${e.message}</div>`;}
  }

  /* ===== CLIENT STATUS ===== */
  async function renderClientStatus(){
    title.textContent='Статус задач';
    body.innerHTML='<div class="empty">Загрузка...</div>';

    try{
      const {data:myClients}=await sb.from('clients').select('id').eq('user_id',user.id);
      const cids=(myClients||[]).map(c=>c.id);
      if(cids.length===0){body.innerHTML='<div class="empty">Нет данных</div>';return;}

      const {data:deals}=await sb.from('deals').select('id,deal_number,contract_number,status').in('client_id',cids);
      if(!deals||deals.length===0){body.innerHTML='<div class="empty">Нет сделок</div>';return;}

      const dealIds=deals.map(d=>d.id);
      const {data:reviews}=await sb.from('reviews').select('*').in('deal_id',dealIds).order('updated_at',{ascending:false});

      /* Contact alerts */
      const contactMade=(reviews||[]).filter(r=>r.status==='contact_made');

      body.innerHTML='';

      if(contactMade.length>0){
        contactMade.forEach(r=>{
          const domain=r.platform_link?new URL(r.platform_link).hostname.replace('www.',''):'площадке';
          body.innerHTML+=`<div class="contact-alert">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
            <span>Вам написали на <strong>${domain}</strong> — пожалуйста, ответьте на площадке</span>
          </div>`;
        });
      }

      if((reviews||[]).length===0){
        body.innerHTML+='<div class="empty">Задач пока нет</div>';
        return;
      }

      (reviews||[]).forEach(r=>{
        const deal=deals.find(d=>d.id===r.deal_id);
        const domain=r.platform_link?new URL(r.platform_link).hostname.replace('www.',''):'—';
        const dealLabel=deal?`#${deal.contract_number||deal.deal_number}`:'—';

        body.innerHTML+=`<div class="rv-card">
          <div class="rv-body">
            <div class="rv-text">${esc(r.review_text)}</div>
            <div class="rv-meta">
              <span>Сделка ${dealLabel}</span>
              <span>${domain}</span>
            </div>
          </div>
          <div class="rv-right">
            <span class="rv-status ${statusClass(r.status)}">${SL[r.status]||r.status}</span>
          </div>
        </div>`;
      });

    }catch(e){body.innerHTML=`<div class="empty" style="color:var(--error)">Ошибка: ${e.message}</div>`;}
  }

  /* ===== AUTHOR RESULTS ===== */
  async function renderAuthorResults(){
    title.textContent='Мои результаты';
    body.innerHTML='<div class="empty">Загрузка...</div>';

    try{
      const {data,error}=await sb.from('reviews').select('id,status,completed_at,platform_link,review_text,created_at')
        .eq('assigned_author_id',user.id).order('created_at',{ascending:false});
      if(error) throw error;
      const all=data||[];

      const completed=all.filter(r=>r.status==='completed').length;
      const inProgress=all.filter(r=>['in_progress','contact_made','review_posted'].includes(r.status)).length;

      body.innerHTML=`
        <div class="stats-row">
          <div class="stat-card"><div class="val">${all.length}</div><div class="lbl">Всего заданий</div></div>
          <div class="stat-card"><div class="val" style="color:var(--success)">${completed}</div><div class="lbl">Выполнено</div></div>
          <div class="stat-card"><div class="val" style="color:var(--warning)">${inProgress}</div><div class="lbl">В работе</div></div>
        </div>
        <div id="authorRevsList"></div>
      `;

      const list=document.getElementById('authorRevsList');
      if(all.length===0){list.innerHTML='<div class="empty">Пока нет заданий</div>';return;}

      list.innerHTML=all.map(r=>{
        const domain=r.platform_link?new URL(r.platform_link).hostname.replace('www.',''):'—';
        return `<div class="rv-card">
          <div class="rv-body">
            <div class="rv-text">${esc(r.review_text)}</div>
            <div class="rv-meta"><span>${domain}</span><span>${r.completed_at?'Завершено '+new Date(r.completed_at).toLocaleDateString('ru-RU'):''}</span></div>
          </div>
          <div class="rv-right"><span class="rv-status ${statusClass(r.status)}">${SL[r.status]||r.status}</span></div>
        </div>`;
      }).join('');

    }catch(e){body.innerHTML=`<div class="empty" style="color:var(--error)">Ошибка: ${e.message}</div>`;}
  }

  function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
})();
</script>
</div>
