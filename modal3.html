<!-- modal3.html — Отзывы (admin/manager) | Статус задач (client) | Результаты (author) -->
<div class="m-root" id="m3Root">
<style>
  .m-root{display:flex;flex-direction:column;height:100%;font-family:inherit;overflow:hidden}
  .m-header{display:flex;justify-content:space-between;align-items:center;height:44px;min-height:44px;padding:0 14px;border-bottom:1px solid var(--border)}
  .m-header-title{font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--fg2)}
  .m-body{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
  .filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:2px}
  .filter-btn{padding:5px 12px;font-size:11px;font-weight:600;border:1px solid var(--border);border-radius:99px;background:var(--panel);color:var(--fg3);cursor:pointer;transition:all .15s}
  .filter-btn:hover{border-color:var(--fg3);color:var(--fg2)}.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .rv-card{display:flex;gap:14px;padding:12px;background:var(--panel);border:1px solid var(--border);border-radius:var(--r);transition:box-shadow .15s;align-items:flex-start}
  .rv-card:hover{box-shadow:var(--sh-s)}@media(max-width:700px){.rv-card{flex-direction:column}}
  .rv-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:4px}
  .rv-text{font-size:12px;color:var(--fg2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .rv-meta{font-size:10px;color:var(--fg3);display:flex;gap:10px;flex-wrap:wrap}
  .rv-right{display:flex;flex-direction:column;gap:4px;align-items:flex-end;flex-shrink:0}
  .rv-status{font-size:9px;font-weight:700;padding:3px 8px;border-radius:99px;text-transform:uppercase}
  .rv-status.draft{background:var(--inset);color:var(--fg3)}.rv-status.pending{background:var(--warn-bg);color:var(--warn)}.rv-status.approved{background:var(--ok-bg);color:var(--ok)}.rv-status.available{background:var(--info-bg);color:var(--info)}.rv-status.progress{background:rgba(139,92,246,.07);color:#7C3AED}.rv-status.completed{background:var(--ok-bg);color:var(--ok)}
  .stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:6px}
  .stat-card{background:var(--inset);border:1px solid var(--border-lt);border-radius:var(--r);padding:16px;text-align:center}.stat-card .val{font-size:28px;font-weight:700}.stat-card .lbl{font-size:10px;color:var(--fg3);margin-top:2px;text-transform:uppercase;font-weight:600}
  .contact-alert{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--info-bg);border:1px solid rgba(37,99,235,.12);border-radius:6px;font-size:12px;color:var(--info);margin-bottom:2px}.contact-alert svg{width:18px;height:18px;flex-shrink:0}
  .empty{text-align:center;padding:30px 16px;color:var(--fg3);font-size:12px}
</style>
<header class="m-header"><div class="m-header-title" id="m3Title">Загрузка...</div></header>
<div class="m-body" id="m3Body"><div class="empty">Загрузка...</div></div>
<script>
(function(){const sb=window.supabaseClient,user=window.currentUser;if(!sb||!user)return;const title=document.getElementById('m3Title'),body=document.getElementById('m3Body');if(user.role==='author')renderAuthorResults();else if(user.role==='client')renderClientStatus();else renderReviewsList();
const SL={draft:'Черновик',pending_approval:'На согл.',client_edited:'Изменён',approved:'Согласован',available:'Доступен',in_progress:'В работе',contact_made:'Контакт',review_posted:'Отзыв',completed:'Выполнен',cancelled:'Отменён'};
function sC(s){if(s==='completed')return'completed';if(['in_progress','contact_made','review_posted'].includes(s))return'progress';if(s==='available')return'available';if(['approved','client_edited'].includes(s))return'approved';if(s==='pending_approval')return'pending';return'draft'}
async function renderReviewsList(){title.textContent='Задания / Отзывы';body.innerHTML='<div class="empty">Загрузка...</div>';try{const isA=user.role==='super_admin';let q=sb.from('reviews').select('*, deals:deal_id(deal_number,contract_number,manager_id), author:assigned_author_id(first_name,last_name)').order('created_at',{ascending:false});if(!isA){const{data:md}=await sb.from('deals').select('id').eq('manager_id',user.id);const ids=(md||[]).map(d=>d.id);if(ids.length>0)q=q.in('deal_id',ids);else{body.innerHTML='<div class="empty">Нет заданий</div>';return}}const{data:reviews,error}=await q;if(error)throw error;const as=[...new Set((reviews||[]).map(r=>r.status))];let cf='all';function render(f){cf=f;const fl=f==='all'?reviews:(reviews||[]).filter(r=>r.status===f);body.innerHTML=`<div class="filters"><button class="filter-btn ${f==='all'?'active':''}" onclick="filterRevs('all')">Все (${(reviews||[]).length})</button>${as.map(s=>{const c=(reviews||[]).filter(r=>r.status===s).length;return`<button class="filter-btn ${f===s?'active':''}" onclick="filterRevs('${s}')">${SL[s]||s} (${c})</button>`}).join('')}</div><div id="revsList"></div>`;const l=document.getElementById('revsList');if(!fl.length){l.innerHTML='<div class="empty">Пусто</div>';return}l.innerHTML=fl.map(r=>{const dm=r.platform_link?new URL(r.platform_link).hostname.replace('www.',''):'—';const an=r.author?`${r.author.first_name} ${r.author.last_name}`:'—';const dl=r.deals?`#${r.deals.contract_number||r.deals.deal_number}`:'—';return`<div class="rv-card"><div class="rv-body"><div class="rv-text">${esc(r.review_text)}</div><div class="rv-meta"><span>${dl}</span><span>${dm}</span><span>${an}</span>${r.deadline?`<span>до ${new Date(r.deadline).toLocaleDateString('ru-RU')}</span>`:''}</div></div><div class="rv-right"><span class="rv-status ${sC(r.status)}">${SL[r.status]||r.status}</span><span style="font-size:10px;color:var(--fg3)">${new Date(r.created_at).toLocaleDateString('ru-RU')}</span></div></div>`}).join('')}window.filterRevs=function(f){render(f)};render('all')}catch(e){body.innerHTML=`<div class="empty" style="color:var(--err)">Ошибка: ${e.message}</div>`}}
async function renderClientStatus(){title.textContent='Статус задач';body.innerHTML='<div class="empty">Загрузка...</div>';try{const{data:mc}=await sb.from('clients').select('id').eq('user_id',user.id);const ci=(mc||[]).map(c=>c.id);if(!ci.length){body.innerHTML='<div class="empty">Нет данных</div>';return}const{data:deals}=await sb.from('deals').select('id,deal_number,contract_number,status').in('client_id',ci);if(!deals?.length){body.innerHTML='<div class="empty">Нет сделок</div>';return}const di=deals.map(d=>d.id);const{data:revs}=await sb.from('reviews').select('*').in('deal_id',di).order('updated_at',{ascending:false});const cm=(revs||[]).filter(r=>r.status==='contact_made');body.innerHTML='';if(cm.length>0)cm.forEach(r=>{const dm=r.platform_link?new URL(r.platform_link).hostname.replace('www.',''):'площадке';body.innerHTML+=`<div class="contact-alert"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg><span>Вам написали на <strong>${dm}</strong></span></div>`});if(!(revs||[]).length){body.innerHTML+='<div class="empty">Задач нет</div>';return}(revs||[]).forEach(r=>{const dl=deals.find(d=>d.id===r.deal_id);const dm=r.platform_link?new URL(r.platform_link).hostname.replace('www.',''):'—';body.innerHTML+=`<div class="rv-card"><div class="rv-body"><div class="rv-text">${esc(r.review_text)}</div><div class="rv-meta"><span>#${dl?.contract_number||dl?.deal_number||'—'}</span><span>${dm}</span></div></div><div class="rv-right"><span class="rv-status ${sC(r.status)}">${SL[r.status]||r.status}</span></div></div>`})}catch(e){body.innerHTML=`<div class="empty" style="color:var(--err)">Ошибка: ${e.message}</div>`}}
async function renderAuthorResults(){title.textContent='Результаты';body.innerHTML='<div class="empty">Загрузка...</div>';try{const{data,error}=await sb.from('reviews').select('id,status,completed_at,platform_link,review_text,created_at').eq('assigned_author_id',user.id).order('created_at',{ascending:false});if(error)throw error;const all=data||[];const co=all.filter(r=>r.status==='completed').length,ip=all.filter(r=>['in_progress','contact_made','review_posted'].includes(r.status)).length;body.innerHTML=`<div class="stats-row"><div class="stat-card"><div class="val">${all.length}</div><div class="lbl">Всего</div></div><div class="stat-card"><div class="val" style="color:var(--ok)">${co}</div><div class="lbl">Выполнено</div></div><div class="stat-card"><div class="val" style="color:var(--warn)">${ip}</div><div class="lbl">В работе</div></div></div><div id="authorRevsList"></div>`;const l=document.getElementById('authorRevsList');if(!all.length){l.innerHTML='<div class="empty">Нет заданий</div>';return}l.innerHTML=all.map(r=>{const dm=r.platform_link?new URL(r.platform_link).hostname.replace('www.',''):'—';return`<div class="rv-card"><div class="rv-body"><div class="rv-text">${esc(r.review_text)}</div><div class="rv-meta"><span>${dm}</span>${r.completed_at?`<span>Завершено ${new Date(r.completed_at).toLocaleDateString('ru-RU')}</span>`:''}</div></div><div class="rv-right"><span class="rv-status ${sC(r.status)}">${SL[r.status]||r.status}</span></div></div>`}).join('')}catch(e){body.innerHTML=`<div class="empty" style="color:var(--err)">Ошибка: ${e.message}</div>`}}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}})();
</script>
</div>
