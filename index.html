<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>АртЗапуск — CRM управления отзывами</title>
  <meta name="description" content="CRM-система управления доставкой отзывов на площадках">
  <meta name="theme-color" content="#18181B">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=SN+Pro:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --bg:#ECECF0;
      --panel:#FFFFFF;
      --inset:#F4F5F7;
      --hover:#EEEEF2;
      --fg:#18181B;
      --fg2:#52525B;
      --fg3:#A1A1AA;
      --border:#E4E4E7;
      --border-lt:#F4F4F5;
      --accent:#18181B;
      --accent-h:#3F3F46;
      --accent-s:rgba(24,24,27,.05);
      --ok:#16A34A;--ok-bg:rgba(22,163,74,.07);
      --warn:#CA8A04;--warn-bg:rgba(202,138,4,.07);
      --err:#DC2626;--err-bg:rgba(220,38,38,.07);
      --info:#2563EB;--info-bg:rgba(37,99,235,.07);
      --sh-s:0 1px 2px rgba(0,0,0,.04);
      --sh-m:0 2px 8px rgba(0,0,0,.06);
      --sh-l:0 8px 30px rgba(0,0,0,.09);
      --sh-xl:0 20px 50px rgba(0,0,0,.13);
      --r:8px;--rl:10px;
      --gap:16px;
      --hdr:52px;
      --side:64px;
      --app-w:1300px;
      --tr:.18s ease;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html{height:100%;overflow:hidden}
    body{font-family:'SN Pro',system-ui,sans-serif;background:var(--bg);color:var(--fg);height:100%;overflow:hidden;-webkit-font-smoothing:antialiased;font-size:13px;line-height:1.5}
    a{color:inherit;text-decoration:none}button{font-family:inherit;cursor:pointer;border:none;background:none}input,textarea,select{font-family:inherit;font-size:inherit}
    ::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}::-webkit-scrollbar-thumb:hover{background:var(--fg3)}
    .hidden{display:none!important}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    @keyframes slideR{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:translateX(0)}}
    @keyframes scan{0%{top:0;opacity:0}5%{opacity:1}95%{opacity:1}100%{top:100%;opacity:0}}

    /* AUTH */
    #authScreen{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;background:var(--bg);transition:opacity .4s,visibility .4s}
    #authScreen.out{opacity:0;visibility:hidden;pointer-events:none}
    #authScreen .scan-line{position:absolute;width:100%;height:1px;background:linear-gradient(90deg,transparent,rgba(24,24,27,.04),transparent);animation:scan 12s linear infinite}
    .auth-wrap{width:100%;max-width:400px;padding:20px;position:relative;z-index:2}
    .auth-logo{text-align:center;margin-bottom:36px;animation:fadeIn .5s ease both}
    .auth-logo-icon{width:48px;height:48px;margin:0 auto 14px;background:var(--accent);border-radius:var(--r);display:flex;align-items:center;justify-content:center}
    .auth-logo-icon svg{width:22px;height:22px;color:#fff}
    .auth-logo h1{font-size:22px;font-weight:600;letter-spacing:-.02em}
    .auth-logo p{font-size:12px;color:var(--fg3);margin-top:3px}
    .auth-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--rl);padding:28px;box-shadow:var(--sh-m);position:relative;overflow:hidden;animation:fadeIn .5s ease .1s both}
    .corner{position:absolute;width:14px;height:14px;border-color:rgba(24,24,27,.06);border-style:solid}
    .corner-tl{top:0;left:0;border-width:1.5px 0 0 1.5px}.corner-tr{top:0;right:0;border-width:1.5px 1.5px 0 0}.corner-bl{bottom:0;left:0;border-width:0 0 1.5px 1.5px}.corner-br{bottom:0;right:0;border-width:0 1.5px 1.5px 0}
    .tab-group{display:flex;background:var(--inset);border-radius:6px;padding:3px;margin-bottom:24px}
    .tab-group label{flex:1;text-align:center;padding:8px 14px;font-size:12px;font-weight:600;border-radius:5px;cursor:pointer;color:var(--fg3);transition:all var(--tr)}
    .tab-group input{display:none}
    .tab-group input:checked+label{background:var(--panel);color:var(--fg);box-shadow:0 1px 3px rgba(0,0,0,.05)}
    .sub-tabs{display:flex;background:var(--inset);border-radius:5px;padding:2px;margin-bottom:18px;max-height:0;overflow:hidden;opacity:0;transition:max-height .3s,opacity .3s,margin .3s}
    .sub-tabs.visible{max-height:44px;opacity:1;margin-bottom:18px}
    .sub-tabs label{flex:1;text-align:center;padding:6px 10px;font-size:11px;font-weight:600;border-radius:4px;cursor:pointer;color:var(--fg3);transition:all var(--tr)}
    .sub-tabs input{display:none}
    .sub-tabs input:checked+label{background:var(--panel);color:var(--fg);box-shadow:0 1px 2px rgba(0,0,0,.04)}
    .auth-views{position:relative;min-height:260px}
    .auth-view{width:100%;transition:opacity .25s,transform .25s}
    .auth-view.is-hidden{position:absolute;top:0;left:0;opacity:0;pointer-events:none;transform:translateX(16px)}
    .auth-view.is-hidden.slide-left{transform:translateX(-16px)}
    .field{position:relative;margin-bottom:14px}.field:last-of-type{margin-bottom:0}
    .field-input{width:100%;padding:11px 14px;font-size:13px;background:var(--inset);border:1.5px solid var(--border);border-radius:6px;color:var(--fg);outline:none;transition:all var(--tr)}
    .field-input::placeholder{color:transparent}
    .field-input:focus{border-color:var(--accent);background:var(--panel);box-shadow:0 0 0 3px var(--accent-s)}
    .field-label{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--fg3);pointer-events:none;transition:all .18s;padding:0 4px}
    .field-input:focus~.field-label,.field-input:not(:placeholder-shown)~.field-label{top:0;font-size:10px;font-weight:500;color:var(--accent);background:var(--panel)}
    .field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    @media(max-width:480px){.field-row{grid-template-columns:1fr}}
    .btn-primary{width:100%;padding:11px 20px;margin-top:20px;background:var(--accent);color:#fff;font-size:13px;font-weight:600;border:none;border-radius:6px;display:flex;align-items:center;justify-content:center;gap:8px;transition:all var(--tr);position:relative}
    .btn-primary:hover{background:var(--accent-h)}.btn-primary:disabled{opacity:.45;cursor:not-allowed}
    .btn-primary .spinner{display:none;width:16px;height:16px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
    .btn-primary.loading .btn-label{visibility:hidden}.btn-primary.loading .spinner{display:block;position:absolute}
    .banner{display:flex;align-items:flex-start;gap:8px;padding:0 12px;border-radius:6px;font-size:11px;line-height:1.5;max-height:0;opacity:0;overflow:hidden;transition:all .3s;margin-top:0}
    .banner.visible{max-height:70px;opacity:1;padding:10px 12px;margin-top:14px}
    .banner svg{flex-shrink:0;margin-top:1px;width:14px;height:14px}
    .banner.error{background:var(--err-bg);border:1px solid rgba(220,38,38,.12);color:var(--err)}
    .banner.success{background:var(--ok-bg);border:1px solid rgba(22,163,74,.12);color:var(--ok)}
    .auth-footer{text-align:center;margin-top:20px;animation:fadeIn .5s ease .25s both}
    .auth-footer span{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--fg3)}
    .auth-footer svg{width:12px;height:12px}

    /* APP SHELL */
    #appShell{display:none;height:100vh;justify-content:center;padding:var(--gap)}
    #appShell.active{display:flex}
    .app-frame{width:100%;max-width:var(--app-w);display:grid;grid-template-rows:var(--hdr) 1fr;grid-template-columns:var(--side) 1fr;gap:var(--gap);height:100%}
    @media(max-width:1023px){.app-frame{grid-template-columns:1fr;grid-template-rows:var(--hdr) 1fr}}
    .header{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding:0 10px;height:var(--hdr);background:var(--panel);border:1px solid var(--border);border-radius:var(--r)}
    .header-left{display:flex;align-items:center;gap:10px}
    .hamburger{display:none;width:36px;height:36px;border:1px solid var(--border);border-radius:6px;align-items:center;justify-content:center;color:var(--fg);transition:all var(--tr)}
    .hamburger:hover{background:var(--inset)}.hamburger svg{width:18px;height:18px}
    @media(max-width:1023px){.hamburger{display:flex}}
    .logo{display:flex;align-items:center;gap:8px}
    .logo-icon{width:32px;height:32px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center}
    .logo-icon svg{width:16px;height:16px;color:#fff}
    .logo-text{font-size:15px;font-weight:700;letter-spacing:-.01em}
    @media(max-width:480px){.logo-text{display:none}}
    .header-right{display:flex;align-items:center;gap:6px}
    .notif-btn{position:relative;width:36px;height:36px;border:1px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--fg2);transition:all var(--tr)}
    .notif-btn:hover{background:var(--inset);color:var(--fg)}.notif-btn svg{width:18px;height:18px}
    .notif-badge{position:absolute;top:-3px;right:-3px;min-width:16px;height:16px;padding:0 4px;background:var(--err);color:#fff;font-size:9px;font-weight:700;border-radius:99px;display:flex;align-items:center;justify-content:center;border:2px solid var(--panel);animation:pulse 2s ease infinite}
    .notif-badge.hidden{display:none}
    .user-btn{display:flex;align-items:center;gap:8px;padding:4px 10px 4px 4px;border:1px solid var(--border);border-radius:6px;transition:all var(--tr)}
    .user-btn:hover{background:var(--inset)}
    .user-avatar{width:28px;height:28px;border-radius:5px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
    .user-info{text-align:left;display:flex;flex-direction:column}.user-name{font-size:12px;font-weight:600;line-height:1.2}.user-role{font-size:10px;color:var(--fg3);line-height:1.2}
    @media(max-width:600px){.user-info{display:none}}
    .dropdown{position:absolute;top:calc(100% + 6px);right:0;width:200px;background:var(--panel);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh-l);z-index:200;padding:4px;opacity:0;visibility:hidden;transform:translateY(-6px);transition:all .15s}
    .dropdown.open{opacity:1;visibility:visible;transform:translateY(0)}
    .dropdown-header{padding:10px;border-bottom:1px solid var(--border);margin-bottom:2px}.dropdown-header .name{font-size:12px;font-weight:600}.dropdown-header .email{font-size:10px;color:var(--fg3);margin-top:1px}
    .dropdown-item{display:flex;align-items:center;gap:8px;padding:8px 10px;font-size:12px;color:var(--fg2);border-radius:5px;width:100%;transition:all var(--tr)}
    .dropdown-item:hover{background:var(--inset);color:var(--fg)}.dropdown-item svg{width:14px;height:14px;flex-shrink:0}
    .dropdown-item.danger{color:var(--err)}.dropdown-item.danger:hover{background:var(--err-bg)}
    .sidebar{display:flex;flex-direction:column;padding:10px 6px;gap:2px;background:var(--panel);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
    .sidebar-spacer{flex:1}
    @media(max-width:1023px){.sidebar{position:fixed;top:0;left:0;bottom:0;width:260px;z-index:150;border-radius:0;transform:translateX(-100%);transition:transform .25s;box-shadow:none;padding:14px 10px}.sidebar.open{transform:translateX(0);box-shadow:var(--sh-xl)}}
    .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:140;opacity:0;transition:opacity .25s}
    .sidebar-overlay.visible{display:block;opacity:1}
    .nav-btn{width:100%;height:44px;display:flex;align-items:center;justify-content:center;gap:8px;border-radius:6px;color:var(--fg3);transition:all var(--tr);font-size:12px;font-weight:500}
    .nav-btn svg{width:20px;height:20px;flex-shrink:0}.nav-btn span{display:none}
    .nav-btn:hover{background:var(--inset);color:var(--fg2)}.nav-btn.active{background:var(--inset);color:var(--fg)}
    @media(max-width:1023px){.nav-btn{height:auto;padding:10px 14px;justify-content:flex-start}.nav-btn span{display:block}}
    .content-area{overflow:hidden;display:flex;flex-direction:column}
    .content-card{flex:1;background:var(--panel);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
    #pageContent{height:100%;overflow:hidden;display:flex;flex-direction:column}
    .page-loader{display:flex;align-items:center;justify-content:center;height:100%;gap:10px;color:var(--fg3);font-size:12px}
    .page-loader .spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
    .modal-overlay{position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.35);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:all .25s}
    .modal-overlay.visible{opacity:1;visibility:visible}
    .modal-box{background:var(--panel);border:1px solid var(--border);border-radius:var(--rl);width:400px;max-width:calc(100vw - 32px);padding:28px;box-shadow:var(--sh-xl);transform:scale(.96);transition:transform .25s}
    .modal-overlay.visible .modal-box{transform:scale(1)}
    .modal-title{font-size:16px;font-weight:700;margin-bottom:4px}.modal-desc{font-size:12px;color:var(--fg3);margin-bottom:20px;line-height:1.5}
    #toastContainer{position:fixed;bottom:var(--gap);right:var(--gap);z-index:9999;display:flex;flex-direction:column;gap:6px;pointer-events:none;max-width:320px}
    @media(max-width:480px){#toastContainer{right:12px;left:12px;max-width:none}}
    .toast{display:flex;align-items:center;gap:8px;padding:11px 14px;border-radius:var(--r);font-size:12px;font-weight:500;background:var(--panel);border:1px solid var(--border);box-shadow:var(--sh-l);pointer-events:auto;animation:slideR .25s ease both;transition:opacity .25s,transform .25s}
    .toast.out{opacity:0;transform:translateX(16px)}.toast svg{width:16px;height:16px;flex-shrink:0}
    .toast.success{border-color:rgba(22,163,74,.2);color:var(--ok)}.toast.error{border-color:rgba(220,38,38,.2);color:var(--err)}.toast.warning{border-color:rgba(202,138,4,.2);color:var(--warn)}.toast.info{border-color:rgba(37,99,235,.2);color:var(--info)}
    .notif-panel{position:absolute;top:calc(100% + 6px);right:0;width:340px;max-height:440px;background:var(--panel);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh-l);z-index:200;display:flex;flex-direction:column;opacity:0;visibility:hidden;transform:translateY(-6px);transition:all .15s}
    .notif-panel.open{opacity:1;visibility:visible;transform:translateY(0)}
    @media(max-width:480px){.notif-panel{width:calc(100vw - 24px);right:-50px}}
    .notif-panel-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--border)}
    .notif-panel-header h3{font-size:13px;font-weight:700}
    .notif-mark-read{font-size:11px;color:var(--accent);font-weight:600;transition:opacity var(--tr)}.notif-mark-read:hover{opacity:.6}
    .notif-list{flex:1;overflow-y:auto;padding:6px}
    .notif-item{display:flex;gap:10px;padding:10px;border-radius:6px;cursor:pointer;transition:background var(--tr)}
    .notif-item:hover{background:var(--inset)}.notif-item.unread{background:var(--accent-s)}.notif-item.unread:hover{background:rgba(24,24,27,.07)}
    .notif-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:5px}.notif-item:not(.unread) .notif-dot{background:transparent}
    .notif-body{flex:1;min-width:0}.notif-title{font-size:12px;font-weight:600;margin-bottom:1px}
    .notif-msg{font-size:11px;color:var(--fg2);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .notif-time{font-size:10px;color:var(--fg3);margin-top:3px}.notif-empty{text-align:center;padding:30px 16px;color:var(--fg3);font-size:12px}
  </style>
</head>
<body>
  <div id="authScreen">
    <div class="scan-line"></div>
    <div class="auth-wrap">
      <div class="auth-logo"><div class="auth-logo-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div><h1>АртЗапуск</h1><p>CRM управления отзывами</p></div>
      <div class="auth-card"><div class="corner corner-tl"></div><div class="corner corner-tr"></div><div class="corner corner-bl"></div><div class="corner corner-br"></div>
        <div class="tab-group"><input type="radio" name="authTab" id="tabLogin" checked><label for="tabLogin">Вход</label><input type="radio" name="authTab" id="tabRegister"><label for="tabRegister">Регистрация</label></div>
        <div class="sub-tabs" id="subTabs"><input type="radio" name="roleTab" id="roleAuthor" checked><label for="roleAuthor">Автор</label><input type="radio" name="roleTab" id="roleManager"><label for="roleManager">Менеджер</label></div>
        <div class="auth-views">
          <form class="auth-view" id="loginView"><div class="field"><input type="text" class="field-input" id="loginEmail" placeholder=" " autocomplete="username"><label class="field-label" for="loginEmail">Email или телефон</label></div><div class="field"><input type="password" class="field-input" id="loginPassword" placeholder=" " autocomplete="current-password"><label class="field-label" for="loginPassword">Пароль</label></div><div class="banner error" id="loginBanner"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span id="loginBannerText"></span></div><button type="submit" class="btn-primary" id="loginBtn"><span class="btn-label">Войти</span><div class="spinner"></div></button></form>
          <form class="auth-view is-hidden" id="registerView"><div class="field-row"><div class="field"><input type="text" class="field-input" id="regLastName" placeholder=" "><label class="field-label">Фамилия</label></div><div class="field"><input type="text" class="field-input" id="regFirstName" placeholder=" "><label class="field-label">Имя</label></div></div><div class="field-row"><div class="field"><input type="text" class="field-input" id="regMiddleName" placeholder=" "><label class="field-label">Отчество</label></div><div class="field"><input type="text" class="field-input" id="regCity" placeholder=" "><label class="field-label">Город</label></div></div><div class="field"><input type="tel" class="field-input" id="regPhone" placeholder=" " maxlength="18"><label class="field-label">Телефон</label></div><div class="field"><input type="email" class="field-input" id="regEmail" placeholder=" " autocomplete="username"><label class="field-label">Email (логин)</label></div><div class="field"><input type="password" class="field-input" id="regPassword" placeholder=" " autocomplete="new-password"><label class="field-label">Пароль</label></div><div class="banner success" id="registerBanner"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg><span>Регистрация завершена. Ожидайте подтверждения.</span></div><button type="submit" class="btn-primary" id="registerBtn"><span class="btn-label">Зарегистрироваться</span><div class="spinner"></div></button></form>
        </div>
      </div>
      <div class="auth-footer"><span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>Защищённое соединение</span></div>
    </div>
  </div>
  <div id="appShell"><div class="app-frame">
